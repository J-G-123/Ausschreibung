name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate PDFs
        run: python3 generate_fillable_pdf.py

      - name: Check output files
        run: |
          test -s Lieferantenausschreibung_Formular.pdf
          test -s Lieferantenausschreibung_ausfuellbar_versand.pdf
          test -s "Lieferantenausschreibung_ausfüllbar_versand.pdf"
          test -s Lieferantenausschreibung_ausfuellbar_versand.zip
